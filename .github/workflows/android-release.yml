name: Android Release Build

on:
  push:
    tags:
      - 'v*'          # triggers on version tags like v1.0.0
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.NOELCAST_KEYSTORE_BASE64 }}" | base64 --decode > frontend/android/app/noelcast-release.keystore

      - name: Build release AAB
        run: |
          cd frontend/android && ./gradlew bundleRelease
        env:
          NOELCAST_STORE_FILE: noelcast-release.keystore
          NOELCAST_STORE_PASSWORD: ${{ secrets.NOELCAST_STORE_PASSWORD }}
          NOELCAST_KEY_ALIAS: ${{ secrets.NOELCAST_KEY_ALIAS }}
          NOELCAST_KEY_PASSWORD: ${{ secrets.NOELCAST_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: noelcast-release-aab
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 7
