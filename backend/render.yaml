services:
  - type: web
    name: noelcast-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://noelcast.netlify.app,http://localhost:8081,http://localhost:19006
